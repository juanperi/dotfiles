# changing commands key
unbind C-b
set -g prefix C-Space
bind-key Space send-prefix

set-window-option -g mode-keys vi

setw -g monitor-activity on
set -g visual-activity on
set -g history-limit 10000

#set-window-option -g window-status-current-bg yellow

set-option -g mouse on
# Auto start copy mode on scroll
# http://superuser.com/a/988688
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# make scape trigger fast
# https://github.com/neovim/neovim/issues/2017#issuecomment-75140861
set -g escape-time 1

# make the window as big as possible
setw -g aggressive-resize on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

set -g default-terminal "screen-256color"

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# Always open new panes/windows in the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Install tpm if not currently installed
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Override plugin bindings — must come after TPM run
# toggle command broadcasting to all panes of current window
bind-key a setw synchronize-panes

# move session tree to S (was s)
bind-key t choose-tree -Zs

# mux session picker popup (was m, now s)
bind-key s display-popup -E -h 40% -w 60% "mux"
